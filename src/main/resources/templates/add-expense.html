<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/script.js"></script>
</head>

<body>

<nav class="navbar">
    <div class="logo">ExpenseTracker</div>

    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/reports">Reports</a>
        <a href="/budget">Budget</a>
        <a href="/add-expense">Add Expense</a>
    </div>
</nav>

<section class="page-header">
    <h1>Add New Expense</h1>
    <p>Track your spending in seconds.</p>
</section>

<div class="form-card">

    <form id="add-expense-form">

        <label for="expense-desc">Description</label>
        <input type="text" id="expense-desc" placeholder="Enter expense desc" required>

        <label for="expense-amount">Amount (₹)</label>
        <input type="number" id="expense-amount" placeholder="₹" min="1" step="any" required>

        <label for="expense-cat">Category</label>
        <select id="expense-cat">
            <option>Food</option>
            <option>Travel</option>
            <option>Academic</option>
            <option>Personal</option>
            <option>Bills</option>
            <option>Other</option>
        </select>

        <label for="expense-date">Date</label>
        <input type="date" id="expense-date" required>

        <button type="submit">
            Save Expense
        </button>

    </form>

</div>

</body>
</html>
