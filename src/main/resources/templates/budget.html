<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<script src="/static/js/script.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="logo">ExpenseTracker</div>
    <div class="nav-links">
        <a href="/index.html">Dashboard</a>
        <a href="/reports.html">Reports</a>
        <a href="/budget.html">Budget</a>
        <a href="/add-expense.html">Add Expense</a>
    </div>
</nav>

<section class="page-header">
    <h1>Budget Planning</h1>
    <p>Stay on track and avoid overspending.</p>
</section>

<section class="budget-wrapper">

<div class="budget-card">
    <h3>Monthly Budget</h3>
    <h1 id="budget-amount">₹0</h1>
    <p id="budget-spent-text">Spent ₹0 of ₹0</p>
    <div class="progress-large">
        <div class="progress-fill" id="budget-progress-fill" style="width: 0%"></div>
    </div>
    <div class="budget-footer">
        <div>
            <span>Remaining</span>
            <h2 id="budget-remaining">₹0</h2>
        </div>
        <div class="status" id="budget-status">✓ On Track</div>
    </div>
</div>

<div class="form-card" style="margin-top: 50px;">
    <h2>Update Overall Budget</h2>
    <form id="set-budget-form" style="margin-top: 20px;">
        <label for="monthly-budget-input">Monthly Budget Limit (₹)</label>
        <input type="number" id="monthly-budget-input" placeholder="e.g. 25000" min="1" required>
        <button type="submit">Update Budget</button>
    </form>
</div>

<div class="form-card" style="margin-top: 40px; margin-bottom: 80px;">
    <h2>Set Category Limits</h2>
    <form id="category-budget-form" style="margin-top: 20px;">
        <label for="category-select">Category</label>
        <select id="category-select">
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Academic">Academic</option>
            <option value="Personal">Personal</option>
            <option value="Bills">Bills</option>
            <option value="Other">Other</option>
        </select>
        <label for="category-limit-input">Limit (₹)</label>
        <input type="number" id="category-limit-input" placeholder="e.g. 5000" min="1" required>
        <button type="submit">Set Category Limit</button>
    </form>
</div>

</section>

</body>
</html>
