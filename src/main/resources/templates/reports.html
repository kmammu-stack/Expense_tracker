<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<script src="/static/js/script.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="logo">ExpenseTracker</div>
    <div class="nav-links">
        <a href="/index.html">Dashboard</a>
        <a href="/reports.html">Reports</a>
        <a href="/budget.html">Budget</a>
        <a href="/add-expense.html">Add Expense</a>
    </div>
</nav>

<section class="page-header">
    <h1>Expense Analytics</h1>
    <p>Understand where your money goes.</p>
</section>

<section class="stats">
    <div class="card">
        <span>Total Spent</span>
        <h2 id="report-total-spent">₹0</h2>
    </div>
    <div class="card">
        <span>Transactions</span>
        <h2 id="report-transactions-count">0</h2>
    </div>
    <div class="card">
        <span>Top Category</span>
        <h2 id="report-top-category">None</h2>
    </div>
</section>

<section class="report-card">
    <h2>Expense Breakdown</h2>
    <div id="category-breakdown"></div>
</section>

<section class="table-card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>Recent Expenses</h2>
        <div>
            <label for="sort-by" style="font-weight:500; margin-right:10px;">Sort By:</label>
            <select id="sort-by" style="padding: 8px 15px; border-radius: 8px; border: 1px solid #ddd; outline:none; height:40px; cursor:pointer;">
                <option value="default">Default</option>
                <option value="date">Date</option>
                <option value="amount">Amount</option>
            </select>
        </div>
    </div>
    <table>
        <thead>
            <tr>
                <th>Description</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Date</th>
                <th style="text-align: right;">Action</th>
            </tr>
        </thead>
        <tbody id="expenses-table-body"></tbody>
    </table>
</section>

</body>
</html>
